server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # GridShift API sidecar — live scoring status and future server-only providers
    location /api/live/ {
        proxy_pass http://gridshift-api:3001/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store" always;
    }

    # KTC proxy — strips Origin/Referer so CORS block doesn't apply
    location /ktc-proxy/ {
        proxy_pass https://keeptradecut.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host keeptradecut.com;
        proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8";
        proxy_set_header Accept-Language "en-US,en;q=0.5";
        proxy_set_header Accept-Encoding "identity";
        proxy_set_header User-Agent "Mozilla/5.0 (X11; Linux x86_64; rv:124.0) Gecko/20100101 Firefox/124.0";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Content-Security-Policy;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (so deploys take effect immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Don't cache the service worker — browser must always check for updates
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Don't cache the PWA manifest
    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
